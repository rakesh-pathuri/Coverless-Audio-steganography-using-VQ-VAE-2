{% extends 'base.html' %}

{% block content %}
<div class="stream">
    <div class="line">Copyright (C) Microsoft Corporation. All rights reserved.</div>
    <div class="line blank"></div>
    <div class="line">PS D:\Audio Steganography Using VQ-VAE-2&gt; access secure audio terminal</div>
    <form method="post" class="cli-form">
        <label class="cli-row">
            <span class="prompt">username:</span>
            <input class="cli-input" type="text" name="username" autocomplete="username" autofocus required>
        </label>
        <label class="cli-row">
            <span class="prompt">password:</span>
            <input class="cli-input" type="password" name="password" autocomplete="current-password" required>
        </label>
        <div class="cli-row">
            <span class="prompt">command:</span>
            <button class="cli-button" type="submit">login</button>
        </div>
    </form>
</div>
{% endblock %}
